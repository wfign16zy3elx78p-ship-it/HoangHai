kind = "web"
previewPath = "/"
title = "BYD Europe Website"
version = "1.0.0"
id = "artifacts/byd-eu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20957

[services.development]
run = "pnpm --filter @workspace/byd-eu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/byd-eu", "run", "build" ]
publicDir = "artifacts/byd-eu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20957"
BASE_PATH = "/"
